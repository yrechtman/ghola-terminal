name: Fetch Fantrax Data

on:
  schedule:
    # 8am EST — morning roster/standings refresh
    - cron: "0 13 * * *"
    # 2pm EST — PrizePicks props are usually posted by now
    - cron: "0 19 * * *"
    # 6pm EST — pre-game refresh before most tip-offs
    - cron: "0 23 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Fetch data (Fantrax + PrizePicks + ADP)
        run: npm run fetch-data

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet src/data.json && echo "No changes" && exit 0
          git add src/data.json
          git commit -m "chore: update data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
